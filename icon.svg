<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3498db"/>
            <stop offset="0.55" stop-color="#0a3d62"/>
            <stop offset="1" stop-color="#020814"/>
        </linearGradient>
        <radialGradient id="sun" cx="0.75" cy="0.25" r="0.2">
            <stop offset="0" stop-color="#FFFCE0"/>
            <stop offset="0.6" stop-color="#FFE082"/>
            <stop offset="1" stop-color="#FFAB40" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Fundo arredondado com gradiente oceânico -->
    <rect width="512" height="512" rx="96" fill="url(#bg)"/>

    <!-- Sol -->
    <circle cx="384" cy="128" r="52" fill="url(#sun)"/>
    <circle cx="384" cy="128" r="36" fill="#FFE082"/>

    <!-- Ondas -->
    <path d="M 0 280 Q 64 260 128 280 T 256 280 T 384 280 T 512 280 L 512 300 L 0 300 Z"
          fill="rgba(255,255,255,0.15)"/>
    <path d="M 0 300 Q 64 285 128 300 T 256 300 T 384 300 T 512 300"
          stroke="rgba(255,255,255,0.35)" stroke-width="3" fill="none"/>

    <!-- Anzol (corpo) -->
    <path d="M 256 130 L 256 340 Q 256 400 216 400 Q 176 400 176 360"
          stroke="#E8E8E8" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Farpa do anzol -->
    <path d="M 176 360 L 196 342" stroke="#E8E8E8" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Emoji peixe dourado -->
    <text x="340" y="420" font-size="110" text-anchor="middle"
          font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🐠</text>
</svg>
